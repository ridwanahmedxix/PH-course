<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <!-- CSS LINK UP  -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- PARENT DIV  -->
    <div class="parentDiv">
      <!-- IMAGE DIV  -->
      <div class="imgDiv">
        <img src="./img/download.jpg" alt="" />
      </div>
      <!-- INFO DIV  -->
      <div class="infoDiv">
        <br />
        <br />
        <h2>LOGIN</h2>
        <br />
        <form>
          <label class="useandPass" for="username"> Username * </label>
          <br />
          <input
            class="userNamPass"
            type="text"
            id="username"
            placeholder="Enter Your Username"
          />
          <br />
          <br />
          <label class="useandPass" for="pass"> Password * </label> <br />
          <input
            class="userNamPass"
            type="password"
            id="pass"
            placeholder="Enter Your Password"
          />
          <br />
          <br />
          <div class="Remember">
            <input type="radio" id="rem" />
            <label for="rem"> Remember me </label>
          </div>
          <br />
          <input class="loginBtn" type="button" value="LOGING" />
        </form>
      </div>
    </div>
    <div class="developerInfo">
      <p>Created by Ridwan Ahmed</p>
    </div>
  </body>
</html>
