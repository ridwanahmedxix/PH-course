<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <!-- CSS LINK  -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <div>
        <form>
          <h2>Survey Form</h2>
          <br />
          <label for="fName"> First Name : </label> <br />
          <br />
          <input class="inPut" id="fName" type="text" />
          <br />
          <br />
          <label for="age"> Age :</label>
          <br />
          <br />
          <input class="inPut" id="age" type="number" />
          <br />
          <br />
          <h3>Favorite Type Of Sport :</h3>
          <br />
          <input type="radio" id="indoor" value="Indoor" />
          <label for="indoor"> Indoor </label>
          <br />
          <input type="radio" id="outdoor" value="Outdoor" />
          <label for="outdoor"> Outdoor </label>

          <br />
          <input type="radio" id="both" value="Both" />
          <label for="both"> Both </label>
          <br />
          <br />

          <label for="FSTW"> Favorite Sport To Watch : </label>
          <br />
          <br />
          <input class="inPut" id="FSTW" type="text" />
          <br />
          <br />
          <label for="FSM"> Favorite Sports Man : </label>
          <br />
          <br />
          <input class="inPut" id="FSM" type="text" />
          <br />
          <br />
          <label for="yourT"> Your Thoughts On Sports : </label>
          <br />
          <br />
          <textarea style="resize: none" class="inPut" id="yourT"></textarea>
          <br />
          <br />
          <input class="submit" type="submit" value="Submit" />
        </form>
      </div>
    </div>
  </body>
</html>
