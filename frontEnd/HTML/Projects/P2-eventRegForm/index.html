<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Registration Form</title>
  </head>
  <body>
    <form
      style="
        width: 800px;
        height: 500px;
        border: 2px solid black;
        padding: 10px 18px 30px 18px;
        margin: 40px auto;
      "
    >
      <h2>Event Registration Form</h2>

      <label for="fName"> First Name</label> <br />
      <input required id="fName" type="text" />
      <br />
      <br />
      <label for="lName"> Last Name</label> <br />
      <input required id="lName" type="text" />
      <br />
      <br />
      <label for="email">Email</label> <br />
      <input requiredid="email" type="email" />
      <br />
      <br />
      <label for="cNumber"> Contact Number</label> <br />
      <input required id="cNumber" type="number" />
      <br />
      <br />
      <label for="address">Address (optional)</label>
      <br />
      <textarea style="width: 300px; height: 80px" id="address"></textarea>
      <br />
      <br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
